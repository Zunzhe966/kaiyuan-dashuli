version: 1
domain: ai-agents
queries:
  - id: q1
    query: 我想做多 Agent 角色分工协作，Python
    intent_tags: [multi-agent]
    expect_any: [crewai, autogen, metagpt, openai-agents-python]
  - id: q2
    query: 本地笔记本快速跑开源模型聊天
    intent_tags: [local-llm]
    expect_any: [ollama, open-webui, llama-cpp]
  - id: q3
    query: GPU 服务器高并发自托管推理
    intent_tags: [local-llm]
    expect_any: [vllm, sglang]
  - id: q4
    query: 做文档问答 RAG，偏数据连接与索引
    intent_tags: [rag]
    expect_any: [llama-index, haystack]
  - id: q5
    query: 需要向量库，先快速原型
    intent_tags: [vector-db]
    expect_any: [chromadb, lancedb]
  - id: q6
    query: 生产环境要带过滤条件的向量检索
    intent_tags: [vector-db]
    expect_any: [qdrant, milvus]
  - id: q7
    query: 给 Agent 接 MCP 工具
    intent_tags: [mcp]
    expect_any: [modelcontextprotocol-servers, mcp-python-sdk]
  - id: q8
    query: 追踪生产环境 LLM 调用和提示版本
    intent_tags: [observability]
    expect_any: [langfuse, arize-phoenix]
  - id: q9
    query: 把 RAG 质量纳入自动评测
    intent_tags: [eval, rag]
    expect_any: [ragas, deepeval]
  - id: q10
    query: 只要强类型结构化输出，不要重型 Agent 框架
    intent_tags: [prompt]
    expect_any: [instructor, pydantic-ai, outlines]
  - id: q11
    query: VS Code 里开源编码助手
    intent_tags: [ui]
    expect_any: [continue]
  - id: q12
    query: 统一多个模型供应商的 API 路由
    intent_tags: [llm-api]
    expect_any: [litellm]

  - id: q13
    query: Kubernetes 上做 GitOps 持续交付
    intent_tags: [ci, orchestration]
    expect_any: [argo-cd, flux2]
  - id: q14
    query: 不想上满血 K8s，只要轻量工作负载调度
    intent_tags: [orchestration]
    expect_any: [nomad]
  - id: q15
    query: 基础设施即代码，团队更熟 Python/TS
    intent_tags: [iac]
    expect_any: [pulumi, terraform]

  - id: q16
    query: React 项目要 SSR 和文件系统路由
    intent_tags: [meta-framework, react]
    expect_any: [nextjs, remix]
  - id: q17
    query: 前端要快速本地开发和现代打包
    intent_tags: [bundler]
    expect_any: [vite]
  - id: q18
    query: 多浏览器端到端测试
    intent_tags: [testing]
    expect_any: [playwright, cypress]
  - id: q19
    query: 嵌入式单文件 SQL 数据库
    intent_tags: [sql, embedded]
    expect_any: [sqlite]
  - id: q20
    query: 低延迟缓存和会话存储
    intent_tags: [cache, kv]
    expect_any: [redis, keydb]
  - id: q21
    query: 大量事件明细做分析查询
    intent_tags: [olap, analytics]
    expect_any: [clickhouse, duckdb]
  - id: q22
    query: CI 里扫描容器镜像漏洞
    intent_tags: [scanning, containers]
    expect_any: [trivy, grype]
  - id: q23
    query: 防止 Git 仓库密钥泄漏
    intent_tags: [secrets, scanning]
    expect_any: [gitleaks]
  - id: q24
    query: 生成软件物料清单 SBOM
    intent_tags: [sbom]
    expect_any: [syft]
  - id: q25
    query: Python 要类型友好的高性能 HTTP API
    intent_tags: [api, python]
    expect_any: [fastapi]
  - id: q26
    query: Node TypeScript 企业级模块化后端
    intent_tags: [api, nodejs]
    expect_any: [nestjs]
  - id: q27
    query: Python 分布式后台任务队列
    intent_tags: [queue, python]
    expect_any: [celery]
  - id: q28
    query: 一套代码做 Android 和 iOS 跨平台 UI
    intent_tags: [mobile, cross-platform]
    expect_any: [flutter, react-native, expo]
  - id: q29
    query: React 团队做移动端并要快速迭代
    intent_tags: [mobile, react]
    expect_any: [expo, react-native]
  - id: q30
    query: 移动应用端到端自动化测试
    intent_tags: [mobile, testing]
    expect_any: [appium, detox]
  - id: q31
    query: Python 表格 DataFrame 处理
    intent_tags: [dataframe, python]
    expect_any: [pandas, polars]
  - id: q32
    query: 深度学习训练框架
    intent_tags: [deep-learning]
    expect_any: [pytorch, tensorflow, jax]
  - id: q33
    query: 机器学习实验跟踪和模型注册
    intent_tags: [mlops]
    expect_any: [mlflow]
