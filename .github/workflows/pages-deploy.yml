name: pages-deploy

on:
  workflow_run:
    workflows: ["verify"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - name: Check whether verified commit is current main
        id: commit
        run: |
          git fetch origin main
          if [[ "$(git rev-parse HEAD)" == "$(git rev-parse origin/main)" ]]; then
            echo "deploy_current=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_current=false" >> "$GITHUB_OUTPUT"
            echo "Skipping superseded verified commit $(git rev-parse --short HEAD)."
          fi

      - name: Validate required secrets
        if: steps.commit.outputs.deploy_current == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          missing=()
          [[ -z "${CLOUDFLARE_API_TOKEN}" ]] && missing+=("CLOUDFLARE_API_TOKEN")
          [[ -z "${CLOUDFLARE_ACCOUNT_ID}" ]] && missing+=("CLOUDFLARE_ACCOUNT_ID")
          if (( ${#missing[@]} > 0 )); then
            echo "::error title=Missing Cloudflare secrets::Please configure ${missing[*]} in GitHub repository secrets. See docs/operations/static-release.md for setup steps."
            exit 1
          fi

      - uses: actions/setup-python@v5
        if: steps.commit.outputs.deploy_current == 'true'
        with:
          python-version: "3.12"

      - name: Build static site
        if: steps.commit.outputs.deploy_current == 'true'
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt
          .venv/bin/python scripts/export_catalog_v1.py --output build/catalog-v1
          .venv/bin/python scripts/build_static_site.py --output build/site --base-url https://kai-yuan-da-shu-li.pages.dev

      - name: Deploy to Cloudflare Pages
        if: steps.commit.outputs.deploy_current == 'true'
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy build/site --project-name kai-yuan-da-shu-li

      - name: Probe live meta after deploy
        if: steps.commit.outputs.deploy_current == 'true'
        env:
          META_URL: https://kai-yuan-da-shu-li.pages.dev/api/v1/meta.json
        run: |
          set -euo pipefail
          # Cloudflare Pages edge can lag behind upload. The default Python urllib identity is
          # challenged by Cloudflare, so use the GitHub Actions identity confirmed for this host.
          .venv/bin/python - <<'PY'
          import json
          import os
          import time
          import subprocess
          from pathlib import Path

          meta_url = os.environ["META_URL"]
          built = json.loads(Path("build/site/api/v1/meta.json").read_text(encoding="utf-8"))
          want_n, want_e = built.get("node_count"), built.get("edge_count")
          live = None
          code = "none"
          # ~3 minutes: 24 * 8s
          for attempt in range(1, 25):
              try:
                  response = subprocess.run(
                      [
                          "curl", "--fail-with-body", "--silent", "--show-error",
                          "--max-time", "30", "--header", "Cache-Control: no-cache",
                          "--header", "Pragma: no-cache", "--user-agent",
                          "GitHub-Actions/1.0 (+https://github.com/actions)", meta_url,
                      ],
                      check=True,
                      capture_output=True,
                      text=True,
                  )
                  code = "200"
                  live = json.loads(response.stdout)
              except Exception as exc:
                  code = f"err:{exc}"
                  live = None
              if live is not None and live.get("node_count") == want_n and live.get("edge_count") == want_e:
                  break
              if live is None:
                  live_s = "none"
              else:
                  live_s = f"{live.get('node_count')}/{live.get('edge_count')}"
              print(f"probe_wait attempt={attempt} http={code} live={live_s} want={want_n}/{want_e}")
              time.sleep(8)
          else:
              live_s = "none" if live is None else f"{live.get('node_count')}/{live.get('edge_count')}"
              raise SystemExit(
                  "live meta scale mismatch vs this build after retries: "
                  f"live={live_s} built={want_n}/{want_e} last_http={code}"
              )

          print(f"probe_http={code}")
          print(f"probe_commit={os.environ.get('GITHUB_SHA', '')}")
          print(f"probe_run_id={os.environ.get('GITHUB_RUN_ID', '')}")
          print(
              f"probe_run_url=https://github.com/{os.environ.get('GITHUB_REPOSITORY', '')}"
              f"/actions/runs/{os.environ.get('GITHUB_RUN_ID', '')}"
          )
          print(f"probe_domains={len(live.get('domains', []))}")
          print(f"probe_node_count={live.get('node_count')}")
          print(f"probe_edge_count={live.get('edge_count')}")
          print(f"probe_generated_at={live.get('generated_at')}")
          print(f"built_node_count={want_n}")
          print(f"built_edge_count={want_e}")
          print("post_deploy_probe=OK")
          PY
