name: pr-gate

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  test-and-build:
    name: test-and-build
    runs-on: ubuntu-latest
    steps:
      - name: Detect research batch changes
        id: research
        env:
          GITHUB_TOKEN: ${{ github.token }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_API_URL: ${{ github.event.pull_request.url }}
          PR_CHANGED_FILES: ${{ github.event.pull_request.changed_files }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from urllib.parse import urlencode
          from urllib.request import Request, urlopen

          changed = os.environ["HEAD_REF"].startswith("data/research-")
          changed_files = int(os.environ["PR_CHANGED_FILES"])
          if changed_files > 3000:
              raise SystemExit("pull request exceeds GitHub's auditable 3000-file limit")
          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {os.environ['GITHUB_TOKEN']}",
              "User-Agent": "kai-yuan-da-shu-li-pr-gate/1.0",
              "X-GitHub-Api-Version": "2022-11-28",
          }
          seen_files = 0
          if not changed:
              for page in range(1, (changed_files + 99) // 100 + 1):
                  query = urlencode({"per_page": 100, "page": page})
                  request = Request(
                      f"{os.environ['PR_API_URL']}/files?{query}", headers=headers
                  )
                  with urlopen(request, timeout=30) as response:
                      files = json.load(response)
                  seen_files += len(files)
                  if any(
                      item.get(key, "").startswith("data/quarantine/research/")
                      for item in files
                      for key in ("filename", "previous_filename")
                  ):
                      changed = True
                      break
              if not changed and seen_files != changed_files:
                  raise SystemExit("Pull Files API did not return the complete changed-file set")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"changed={'true' if changed else 'false'}\n")
          print(f"research_changed={'true' if changed else 'false'}")
          PY

      - name: Delegate research validation
        if: steps.research.outputs.changed == 'true'
        run: echo "research PR content is validated only by the trusted research-boundary workflow"

      - name: Check out exact candidate head without credentials
        if: steps.research.outputs.changed != 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          path: candidate
          persist-credentials: false

      - uses: actions/setup-python@v5
        if: steps.research.outputs.changed != 'true'
        with:
          python-version: "3.12"

      - name: Create candidate virtual environment
        if: steps.research.outputs.changed != 'true'
        working-directory: candidate
        run: python -m venv .venv

      - name: Install candidate dependencies
        if: steps.research.outputs.changed != 'true'
        working-directory: candidate
        run: .venv/bin/pip install -r requirements.txt

      - name: Validate graph
        if: steps.research.outputs.changed != 'true'
        working-directory: candidate
        run: .venv/bin/python scripts/validate_graph.py

      - name: Run unit tests
        if: steps.research.outputs.changed != 'true'
        working-directory: candidate
        run: .venv/bin/python -m unittest discover -s tests -v

      - name: Run retrieval evaluation
        if: steps.research.outputs.changed != 'true'
        working-directory: candidate
        run: .venv/bin/python scripts/run_retrieval_eval.py

      - name: Export catalog
        if: steps.research.outputs.changed != 'true'
        working-directory: candidate
        run: .venv/bin/python scripts/export_catalog_v1.py --output build/catalog-v1

      - name: Build static site
        if: steps.research.outputs.changed != 'true'
        working-directory: candidate
        run: .venv/bin/python scripts/build_static_site.py --output build/site --base-url https://kai-yuan-da-shu-li.pages.dev

      - name: Verify static site contract
        if: steps.research.outputs.changed != 'true'
        working-directory: candidate
        run: |
          .venv/bin/python - <<'PY'
          import json
          from pathlib import Path

          site = Path("build/site")
          meta = json.loads((site / "api/v1/meta.json").read_text(encoding="utf-8"))
          assert meta["node_count"] > 0
          assert meta["edge_count"] > 0
          assert not "adsbygoogle" in "".join(
              path.read_text(encoding="utf-8") for path in site.rglob("*.html")
          )
          for route in ("about", "contact", "privacy", "cookies", "advertising", "methodology"):
              assert (site / route / "index.html").is_file(), route
          print("static_site_contract=OK")
          PY

      - name: Build release
        if: steps.research.outputs.changed != 'true'
        working-directory: candidate
        run: .venv/bin/python scripts/build_release.py --site build/site --output build/releases --release-name ci

      - name: Upload verified static release
        if: steps.research.outputs.changed != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: verified-static-release
          path: candidate/build/releases/
          retention-days: 7

      - name: Upload verified static site
        if: steps.research.outputs.changed != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: verified-static-site
          path: candidate/build/site/
          retention-days: 7
