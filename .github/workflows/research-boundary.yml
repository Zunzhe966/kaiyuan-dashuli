name: research-boundary

on:
  pull_request_target:
    types: [opened, synchronize, reopened, edited]

permissions:
  actions: read
  contents: read
  pull-requests: read

concurrency:
  group: research-boundary-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  validate:
    name: research-boundary
    runs-on: ubuntu-latest
    steps:
      - name: Check out trusted base
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 0
          path: trusted-validator

      - name: Check out candidate without credentials
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          path: candidate
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Detect research batch changes
        id: research
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_REF: ${{ github.head_ref }}
          CANDIDATE: ${{ github.workspace }}/candidate
        run: |
          set -euo pipefail
          git -C "$CANDIDATE" fetch --no-tags \
            "https://github.com/${GITHUB_REPOSITORY}.git" "$BASE_SHA"
          git -C "$CANDIDATE" cat-file -e "$BASE_SHA^{commit}"
          git -C "$CANDIDATE" merge-base "$BASE_SHA" HEAD >/dev/null
          DIFF_LIST="$RUNNER_TEMP/research-changed-files.zlist"
          if ! git -C "$CANDIDATE" diff --name-only -z --no-renames \
            "$BASE_SHA...HEAD" > "$DIFF_LIST"; then
            echo "ERROR: unable to classify the exact pull request snapshot" >&2
            exit 1
          fi
          changed=false
          if [[ "$HEAD_REF" == data/research-* ]]; then
            changed=true
          fi
          while IFS= read -r -d '' path; do
            if [[ "$path" == data/quarantine/research/* ]]; then
              changed=true
              break
            fi
          done < "$DIFF_LIST"
          echo "changed=$changed" >> "$GITHUB_OUTPUT"

      - name: Enforce trusted research contract
        if: steps.research.outputs.changed == 'true'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_REF: ${{ github.head_ref }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.event.after }}
          EVENT_ACTION: ${{ github.event.action }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          TRUSTED_VALIDATOR: ${{ github.workspace }}/trusted-validator
          CANDIDATE: ${{ github.workspace }}/candidate
          TRUSTED_VENV: ${{ runner.temp }}/trusted-validator-venv
          TRUSTED_HISTORY: ${{ runner.temp }}/research-validation-root
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          [[ "$BASE_REF" == "main" ]] || {
            echo "ERROR: research accumulation PR must target main" >&2
            exit 1
          }
          [[ "$HEAD_REPO" == "$GITHUB_REPOSITORY" ]] || {
            echo "ERROR: research accumulation PR must use a branch in this repository" >&2
            exit 1
          }
          if [[ "$HEAD_REF" != data/research-* ]]; then
            maintainer_paths=0
            while IFS= read -r -d '' path; do
              ((maintainer_paths += 1))
              [[ "$path" == "data/quarantine/research/worker-config.json" ]] || {
                echo "ERROR: maintainer research PR may only change worker-config.json" >&2
                exit 1
              }
            done < "$RUNNER_TEMP/research-changed-files.zlist"
            (( maintainer_paths == 1 )) || {
              echo "ERROR: maintainer research PR must change worker-config.json only" >&2
              exit 1
            }
            echo "maintainer_research_contract=OK"
            exit 0
          fi
          cd "$RUNNER_TEMP"
          python -m venv "$TRUSTED_VENV"
          "$TRUSTED_VENV/bin/pip" install -r "$TRUSTED_VALIDATOR/requirements.txt"

          BATCH_LIST="$RUNNER_TEMP/research-batches.txt"
          if ! "$TRUSTED_VENV/bin/python" \
            "$TRUSTED_VALIDATOR/scripts/validate_research_worker_diff.py" \
            --base "$BASE_SHA" \
            --head HEAD \
            --branch "$HEAD_REF" \
            --repo-root "$CANDIDATE" \
            --config "$TRUSTED_VALIDATOR/data/quarantine/research/worker-config.json" \
            > "$BATCH_LIST"; then
            echo "ERROR: trusted research diff validator failed" >&2
            exit 1
          fi
          mapfile -t batch_files < "$BATCH_LIST"
          (( ${#batch_files[@]} > 0 )) || {
            echo "ERROR: research validator returned no batch pairs" >&2
            exit 1
          }
          (( ${#batch_files[@]} % 2 == 0 )) || {
            echo "ERROR: research validator returned an incomplete batch pair" >&2
            exit 1
          }

          [[ "$PR_TITLE" == "data: research accumulation" ]] || {
            echo "ERROR: research worker PR title must be: data: research accumulation" >&2
            exit 1
          }

          online_pair_index=-1
          required_success_sha=""
          mapfile -t head_lineage < <(
            git -C "$CANDIDATE" rev-list --parents -n 1 HEAD
          )
          (( ${#head_lineage[@]} == 1 )) || {
            echo "ERROR: unable to read candidate head lineage" >&2
            exit 1
          }
          read -r -a head_parents <<< "${head_lineage[0]}"
          (( ${#head_parents[@]} == 2 )) || {
            echo "ERROR: research accumulation head must have exactly one parent" >&2
            exit 1
          }
          [[ "${head_parents[0]}" == "$HEAD_SHA" ]] || {
            echo "ERROR: candidate checkout does not match the event head SHA" >&2
            exit 1
          }
          if [[ "$EVENT_ACTION" == "opened" ]]; then
            (( ${#batch_files[@]} == 2 )) || {
              echo "ERROR: a research accumulation PR must open with exactly one batch" >&2
              exit 1
            }
            [[ "${head_parents[1]}" == "$BASE_SHA" ]] || {
              echo "ERROR: opened research head must be the direct child of base" >&2
              exit 1
            }
            online_pair_index=0
          elif [[ "$EVENT_ACTION" == "synchronize" ]]; then
            [[ "$HEAD_SHA" == "$AFTER_SHA" ]] || {
              echo "ERROR: synchronize checkout must match event after SHA" >&2
              exit 1
            }
            [[ "${head_parents[1]}" == "$BEFORE_SHA" ]] || {
              echo "ERROR: synchronize head must be the direct child of before" >&2
              exit 1
            }
            required_success_sha="$BEFORE_SHA"
            online_pair_index=$((${#batch_files[@]} - 2))
          elif [[ "$EVENT_ACTION" == "edited" ]]; then
            required_success_sha="$HEAD_SHA"
            echo "metadata-only event: reusing the existing immutable batch history"
          elif [[ "$EVENT_ACTION" == "reopened" ]]; then
            echo "ERROR: reopened research accumulation PRs are not accepted" >&2
            exit 1
          else
            echo "ERROR: unsupported pull request action: $EVENT_ACTION" >&2
            exit 1
          fi

          if [[ -n "$required_success_sha" ]]; then
            PREVIOUS_RESEARCH_SHA="$required_success_sha" \
              "$TRUSTED_VENV/bin/python" - <<'PY'
          import json
          import os
          from urllib.parse import urlencode
          from urllib.request import Request, urlopen

          repository = os.environ["GITHUB_REPOSITORY"]
          previous_sha = os.environ["PREVIOUS_RESEARCH_SHA"]
          head_ref = os.environ["HEAD_REF"]
          query = urlencode(
              {
                  "event": "pull_request_target",
                  "status": "completed",
                  "per_page": 100,
              }
          )
          url = (
              f"https://api.github.com/repos/{repository}/actions/workflows/"
              f"research-boundary.yml/runs?{query}"
          )
          request = Request(
              url,
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {os.environ['GITHUB_TOKEN']}",
                  "User-Agent": "kai-yuan-da-shu-li-validator/1.0",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          with urlopen(request, timeout=30) as response:
              payload = json.load(response)
          prior_success = any(
              run.get("conclusion") == "success"
              and run.get("head_sha") == previous_sha
              and run.get("head_branch") == head_ref
              for run in payload.get("workflow_runs", [])
          )
          if not prior_success:
              raise SystemExit(
                  "previous accumulation commit lacks a successful research-boundary check"
              )
          print("previous_research_boundary=OK")
          PY
          fi

          rm -rf "$TRUSTED_HISTORY"
          mkdir -p "$TRUSTED_HISTORY"
          cp -a "$TRUSTED_VALIDATOR/." "$TRUSTED_HISTORY/"
          for ((index=0; index<${#batch_files[@]}; index+=2)); do
            artifact="${batch_files[index]}"
            manifest="${batch_files[index+1]}"
            [[ -f "$CANDIDATE/$artifact" && ! -L "$CANDIDATE/$artifact" ]] || {
              echo "ERROR: candidate artifact must be a regular non-symlink file" >&2
              exit 1
            }
            [[ -f "$CANDIDATE/$manifest" && ! -L "$CANDIDATE/$manifest" ]] || {
              echo "ERROR: candidate manifest must be a regular non-symlink file" >&2
              exit 1
            }
            install -m 0644 "$CANDIDATE/$artifact" "$TRUSTED_HISTORY/$artifact"
            install -m 0644 "$CANDIDATE/$manifest" "$TRUSTED_HISTORY/$manifest"
            verify_args=()
            if (( index == online_pair_index )); then
              verify_args+=(--verify-github-enumeration)
            fi
            "$TRUSTED_VENV/bin/python" \
              "$TRUSTED_VALIDATOR/scripts/validate_research_batch.py" \
              "$artifact" "$manifest" \
              --repo-root "$TRUSTED_HISTORY" \
              --contract-root "$TRUSTED_VALIDATOR" \
              --history-root "$TRUSTED_HISTORY" \
              "${verify_args[@]}"
          done

      - name: Enforce one open DeepSeek research PR
        if: steps.research.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          CURRENT_PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from urllib.parse import urlencode
          from urllib.request import Request, urlopen

          repository = os.environ["GITHUB_REPOSITORY"]
          current_pr = int(os.environ["CURRENT_PR"])
          base_url = f"https://api.github.com/repos/{repository}/pulls?state=open&per_page=100"
          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {os.environ['GITHUB_TOKEN']}",
              "User-Agent": "kai-yuan-da-shu-li-validator/1.0",
              "X-GitHub-Api-Version": "2022-11-28",
          }
          open_workers = []
          for page in range(1, 101):
              request = Request(f"{base_url}&{urlencode({'page': page})}", headers=headers)
              with urlopen(request, timeout=30) as response:
                  pulls = json.load(response)
              open_workers.extend(
                  pull for pull in pulls
                  if pull.get("base", {}).get("ref") == "main"
                  and pull.get("head", {}).get("repo", {}).get("full_name") == repository
                  and pull.get("head", {}).get("ref", "").startswith("data/research-")
              )
              if len(pulls) < 100:
                  break
          others = [pull for pull in open_workers if pull.get("number") != current_pr]
          if others:
              numbers = ", ".join(f"#{pull['number']}" for pull in others)
              raise SystemExit(f"another DeepSeek research PR is already open: {numbers}")
          print("open_research_pr_contract=OK")
          PY
