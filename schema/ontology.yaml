# 开源大梳理 — ontology（分类与字段规范）
version: 0.1.0
updated: 2026-07-11

# 领域（第一期 ai-agents；D6 起扩 devops）
domains:
  ai-agents:
    title: AI / Agent / LLM 工具链
    description: 模型接入、Agent 框架、RAG、评测、提示词、MCP、编排与观测
  devops:
    title: DevOps / 云原生基础设施
    description: 容器、编排、IaC、可观测、网关、CI/GitOps
  web-frontend:
    title: Web 前端工程
    description: UI 框架、元框架、构建、样式、测试、monorepo
  databases:
    title: 数据库与搜索存储
    description: 关系型、文档、KV、分布式、OLAP、图、搜索
  security:
    title: 安全与供应链
    description: 密钥、扫描、SAST、签名、策略、IAM、加固
  backend:
    title: 后端与 API
    description: Web/API 框架、RPC、任务队列与消息
  mobile:
    title: 移动端
    description: 跨平台、Android、iOS、移动测试
  data-ml:
    title: 数据与机器学习
    description: DataFrame、经典 ML、深度学习、大数据、MLOps
  devtools:
    title: 开发者工具与 CLI
    description: 搜索、任务运行、版本管理、语言工具链、终端编辑器
  desktop:
    title: 桌面应用
    description: WebView 壳、原生 UI、即时模式与多端桌面目标
  cms-docs:
    title: CMS 与文档站
    description: 经典/无头 CMS、文档生成器与内容静态站
  networking:
    title: 网络与边缘
    description: 代理、网关、网格、DNS、组网 VPN、隧道与排障
  observability:
    title: 可观测性
    description: 指标、日志、链路、APM、采集管道与可用性监控
  iot:
    title: 物联网与嵌入式
    description: 家庭自动化、MCU 固件、RTOS、MQTT、无线桥接与边缘 ML
  media:
    title: 音视频与媒体
    description: 转码、播放、录播、媒体服务、剪辑与语音视觉
  gamedev:
    title: 游戏开发
    description: 引擎、框架、物理、内容工具与 Web 游戏
  gis:
    title: 地理空间
    description: GIS 桌面、空间库、Web 地图、瓦片与遥感点云
  finance:
    title: 金融与记账
    description: 交易回测、行情指标、个人财务与订阅计费
  blockchain:
    title: 区块链与 Web3
    description: 客户端、合约工具链、L1 框架、P2P 存储与索引

# 节点类型
node_types:
  project:
    description: 一个可指向的开源仓库或组织级产品
  category:
    description: 分类节点（可嵌套）
  ecosystem:
    description: 生态位（如 LangChain 生态、Hugging Face 生态）

# 项目节点必填/选填字段
project_fields:
  required: [id, name, repo, summary, tags, status]
  optional: [homepage, language, license, use_when, avoid_when, niche, related_ecosystem, quality_notes]

# 关系类型
edge_types:
  alternative_to:
    description: A 与 B 解决同类问题，可互相替代
  depends_on:
    description: A 常见依赖或建立在 B 之上
  integrates_with:
    description: A 与 B 常集成，但非硬依赖
  supersedes:
    description: A 在多数场景更推荐于 B（后继/更优默认）
  same_ecosystem:
    description: 同属一个生态，配套使用
  parent_category:
    description: 分类从属

# 标签约定（可扩展；写入时尽量复用）
tag_vocabulary:
  - agent-framework
  - llm-api
  - rag
  - vector-db
  - eval
  - prompt
  - mcp
  - orchestration
  - observability
  - local-llm
  - fine-tuning
  - dataset
  - ui
  - multi-agent
